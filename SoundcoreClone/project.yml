name: SoundcoreClone
options:
  bundleIdPrefix: com.example
targets:
  SoundcoreClone:
    type: application
    platform: iOS
    # Crucial fix: The Translation API view modifier `translationTask` is actually iOS 17.4, 
    # but TranslationSession programmatic initialization explicitly requires iOS 18.0+.
    # Since your iPhone is on 18.4, we can safely bump the target to 18.0 to pass compilation.
    deploymentTarget: "18.0"
    sources: [Sources]
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "We need access to the microphone to record and translate your speech."
        NSSpeechRecognitionUsageDescription: "We need speech recognition to transcribe your voice."
    settings:
      SDKROOT: iphoneos
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
