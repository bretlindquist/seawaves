name: SoundcoreClone
options:
  bundleIdPrefix: com.example
targets:
  SoundcoreClone:
    type: application
    platform: iOS
    deploymentTarget: "17.4"
    sources: [Sources]
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "We need access to the microphone to record and translate your speech."
        NSSpeechRecognitionUsageDescription: "We need speech recognition to transcribe your voice."
    settings:
      # Explicitly tell Xcode we want to build with its current SDK (18.2) 
      # but allow deployment to anything newer.
      IPHONEOS_DEPLOYMENT_TARGET: "17.4"
      SDKROOT: iphoneos
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
